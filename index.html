<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pictures</title>
    <style>
      :root {
        --bg: #f4f6f8;
        --card: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --accent: #0f766e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Avenir Next", "PingFang SC", "Hiragino Sans GB", sans-serif;
        background: radial-gradient(circle at top left, #e6f6f4 0, var(--bg) 45%, #eef2f7 100%);
        color: var(--text);
      }

      .container {
        width: min(1000px, 92%);
        margin: 48px auto;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(1.8rem, 2.8vw, 2.6rem);
        letter-spacing: 0.02em;
      }

      p {
        margin: 0 0 26px;
        color: var(--muted);
      }

      .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 18px;
      }

      figure {
        margin: 0;
        background: var(--card);
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.09);
      }

      img {
        width: 100%;
        height: 280px;
        object-fit: cover;
        display: block;
      }

      figcaption {
        padding: 12px 14px;
        color: var(--accent);
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="gallery">
        <figure>
          <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1200&q=80" alt="山景照片" />
          <figcaption>照片 1</figcaption>
        </figure>
        <figure>
          <img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e?auto=format&fit=crop&w=1200&q=80" alt="湖泊照片" />
          <figcaption>照片 2</figcaption>
        </figure>
        <figure>
          <img src="https://images.unsplash.com/photo-1519046904884-53103b34b206?auto=format&fit=crop&w=1200&q=80" alt="海边照片" />
          <figcaption>照片 3</figcaption>
        </figure>
      </section>
    </main>
  </body>
</html>
